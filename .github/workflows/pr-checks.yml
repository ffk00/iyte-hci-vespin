name: PR Checks

# Runs on every pull request. Path filtering ensures backend checks only run
# when backend/ changes, frontend checks only when frontend/ changes. Saves
# CI minutes and keeps PR feedback fast.
#
# This workflow is the gate that should be required for merging to main
# (configured in repo Settings → Branches → Branch protection rules).
on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect what changed so downstream jobs can decide whether to run.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      openapi: ${{ steps.filter.outputs.openapi }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'deploy/**'
            frontend:
              - 'frontend/**'
            openapi:
              - 'backend/api/openapi.yaml'
              - 'frontend/src/api/generated/**'
              - 'frontend/orval.config.ts'

  # ---------------------------------------------------------------------------
  # Backend: vet, build. Light by design (we agreed to keep tests minimal).
  # ---------------------------------------------------------------------------
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Verify modules
        run: go mod verify

      - name: gofmt check
        run: |
          # Fail if any file would be reformatted by gofmt.
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::The following files are not gofmt-clean:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build (compile check)
        run: go build -v ./...

  # ---------------------------------------------------------------------------
  # Frontend: typecheck and lint. No build step.
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # pnpm must be set up before setup-node so its built-in `cache: pnpm`
      # can locate the store. This replaces the brittle `pnpm store path` +
      # actions/cache dance that could yield an empty cache path.
      - uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

  # ---------------------------------------------------------------------------
  # OpenAPI: validate the spec and fail if the generated client has drifted.
  # The spec is the source of truth; generated code must be regenerated and
  # committed whenever it changes. (Merged in from the former openapi.yml.)
  # ---------------------------------------------------------------------------
  openapi:
    name: OpenAPI checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.openapi == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Validate spec (OpenAPI 3.1)
        run: npx @redocly/cli@latest lint ../backend/api/openapi.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate Orval output
        run: pnpm orval

      - name: Check for drift
        run: |
          if ! git diff --exit-code src/api/generated/; then
            echo ""
            echo "::error::Generated API code is out of sync with openapi.yaml."
            echo "::error::Run 'pnpm orval' locally, commit the regenerated files, and push."
            exit 1
          fi
          echo "Generated code is in sync with the spec."
