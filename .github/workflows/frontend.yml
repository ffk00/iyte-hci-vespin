name: Frontend — EAS Update

# Triggered on push to main when frontend code changes.
# Runs typecheck and lint, then publishes a new EAS Update to the
# 'production' channel so teammates running Expo Go get the latest JS bundle.
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

concurrency:
  group: frontend-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Typecheck, Lint & EAS Update
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Publish EAS Update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # Baked into the JS bundle as process.env.EXPO_PUBLIC_API_URL.
          # Set in repo variables (Settings → Secrets and variables → Variables).
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
        run: |
          eas update \
            --branch production \
            --message "${{ github.event.head_commit.message }}" \
            --non-interactive
